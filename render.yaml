services:
  - type: web
    name: symbol-semantic-index-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: "PYTHONPATH=src uvicorn material_symbol_semantic_index.api.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
    healthCheckPath: /health
